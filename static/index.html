<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClimFire — Victoria, Australia</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --fire-red:    #ff2a00;
      --fire-orange: #ff6a00;
      --fire-amber:  #ffb300;
      --fire-yellow: #ffd700;
      --smoke-dark:  #0a0a0a;
      --smoke-mid:   #161616;
      --smoke-light: #1f1f1f;
      --ash:         #3a3a3a;
      --ember:       #ff4500;
      --text-bright: #fff8f0;
      --text-muted:  #8a7060;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--smoke-dark);
      color: var(--text-bright);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ANIMATED FIRE BACKGROUND ── */
    .fire-bg {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 260px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .flame {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 20% 20%;
      animation: flicker linear infinite;
      transform-origin: bottom center;
      filter: blur(1px);
    }

    @keyframes flicker {
      0%   { transform: scaleX(1)   scaleY(1)    rotate(-2deg); opacity: 0.9; }
      25%  { transform: scaleX(0.9) scaleY(1.05) rotate(1deg);  opacity: 1;   }
      50%  { transform: scaleX(1.1) scaleY(0.95) rotate(-1deg); opacity: 0.85;}
      75%  { transform: scaleX(0.95)scaleY(1.08) rotate(2deg);  opacity: 0.95;}
      100% { transform: scaleX(1)   scaleY(1)    rotate(-2deg); opacity: 0.9; }
    }

    .fire-overlay {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 320px;
      background: linear-gradient(to top, rgba(255,42,0,0.08) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── MAIN CONTENT ── */
    .content {
      position: relative;
      z-index: 1;
      padding: 2.5rem 2rem 14rem;
      max-width: 1140px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-top: 1rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 8vw, 6rem);
      letter-spacing: 0.06em;
      line-height: 1;
      background: linear-gradient(160deg, var(--fire-yellow) 0%, var(--fire-orange) 40%, var(--fire-red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(255,106,0,0.5));
    }

    .logo-sub {
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .model-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      background: var(--smoke-light);
      border: 1px solid var(--ash);
      color: var(--text-muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 999px;
    }

    .dot-live {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--fire-orange);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── ALERT BANNER ── */
    #alerta-general {
      display: none;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border-left: 3px solid;
      background: rgba(255,255,255,0.03);
    }

    /* ── STATS ROW ── */
    #resumen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--smoke-light);
      border: 1px solid var(--ash);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--fire-orange); }

    .stat-valor {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--fire-amber);
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* ── CARDS GRID ── */
    #cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--smoke-light);
      border: 1px solid var(--ash);
      border-radius: 12px;
      padding: 1.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .card.riesgo-alto {
      border-color: rgba(255,42,0,0.4);
      box-shadow: 0 0 20px rgba(255,42,0,0.1);
    }

    .card.riesgo-alto::before   { background: var(--fire-red); }
    .card.riesgo-moderado::before { background: var(--fire-orange); }
    .card.riesgo-bajo::before   { background: #22c55e; }

    .card .fecha {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .riesgo-badge {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      padding: 0.25rem 0.8rem;
      border-radius: 4px;
      width: fit-content;
    }

    /* RISK BAR */
    .barra-fondo {
      background: var(--smoke-dark);
      border-radius: 999px;
      height: 4px;
      overflow: hidden;
      margin-top: 0.2rem;
    }

    .barra-relleno {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* DATA ROWS */
    .datos {
      border-top: 1px solid var(--ash);
      padding-top: 0.7rem;
      margin-top: 0.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.38rem;
    }

    .dato-fila {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
    }

    .dato-fila .etiqueta { color: var(--text-muted); }
    .dato-fila .valor    { font-weight: 600; color: var(--text-bright); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--ash);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--fire-orange); }

    .loading {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 4rem 0;
      grid-column: 1 / -1;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <!-- FIRE BACKGROUND -->
  <div class="fire-bg" id="fireBg"></div>
  <div class="fire-overlay"></div>

  <div class="content">

    <header>
      <div class="logo">ClimFire</div>
      <div class="logo-sub">Victoria, Australia · Forest Fire Risk System</div>
      <div class="model-pill">
        <span class="dot-live"></span>
        Live · Random Forest ML · Open-Meteo API
      </div>
    </header>

    <div id="alerta-general"></div>
    <div id="resumen"></div>

    <div id="cards-container">
      <p class="loading">Consultando modelo de ML...</p>
    </div>

    <footer>
      <p>Datos: <a href="https://open-meteo.com" target="_blank">Open-Meteo Archive & Forecast API</a> · Modelo entrenado 2015–2024</p>
      <p style="margin-top:0.4rem">ClimFire · WeatherWise Hack 2026</p>
    </footer>

  </div>

  <script>
    /* ── GENERATE FLAMES ── */
    const fireBg = document.getElementById('fireBg')
    const flameColors = [
      ['#ff2a00','#ff6a00'],
      ['#ff6a00','#ffb300'],
      ['#ff4500','#ff8c00'],
      ['#ff1a00','#ff5500'],
      ['#ffb300','#ffd700'],
    ]

    for (let i = 0; i < 28; i++) {
      const f = document.createElement('div')
      f.className = 'flame'
      const w = 30 + Math.random() * 70
      const h = 60 + Math.random() * 180
      const left = (i / 28) * 105 - 2
      const [c1, c2] = flameColors[Math.floor(Math.random() * flameColors.length)]
      const dur = 1.2 + Math.random() * 1.8
      const delay = Math.random() * -2

      f.style.cssText = `
        width:${w}px; height:${h}px;
        left:${left}%;
        background: linear-gradient(to top, ${c1}, ${c2}, transparent);
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        opacity: ${0.3 + Math.random() * 0.6};
      `
      fireBg.appendChild(f)
    }

    /* ── DATA ── */
    const niveles = { 'BAJO': 0, 'MODERADO': 1, 'ALTO': 2 }
    const porcentajeBarra = { 'BAJO': 18, 'MODERADO': 58, 'ALTO': 94 }
    const colorRiesgo = { 'BAJO': '#22c55e', 'MODERADO': '#ff6a00', 'ALTO': '#ff2a00' }

    fetch('/api/forecast')
      .then(r => r.json())
      .then(dias => render(dias))
      .catch(err => {
        document.getElementById('cards-container').innerHTML =
          `<p style="color:#ff2a00;text-align:center;grid-column:1/-1;padding:3rem 0">
            Error al conectar con el servidor
          </p>`
      })

    function render(dias) {
      const riesgoMax = dias.reduce((max, d) =>
        niveles[d.riesgo] > niveles[max.riesgo] ? d : max
      )

      /* ALERT */
      const mensajes = {
        'BAJO':     'Sin riesgo significativo de incendio esta semana.',
        'MODERADO': 'Condiciones moderadas detectadas — mantener precaución.',
        'ALTO':     '⚠ Riesgo ALTO detectado — condiciones de incendio peligrosas.'
      }
      const alerta = document.getElementById('alerta-general')
      alerta.style.display = 'block'
      alerta.style.borderLeftColor = colorRiesgo[riesgoMax.riesgo]
      alerta.style.color = colorRiesgo[riesgoMax.riesgo]
      alerta.textContent = mensajes[riesgoMax.riesgo]

      /* STATS */
      const tempMax     = Math.max(...dias.map(d => d.temperatura))
      const lluviaTotal = dias.reduce((s, d) => s + d.lluvia, 0).toFixed(1)
      const vientoMax   = Math.max(...dias.map(d => d.viento))
      const sequiaMax   = Math.max(...dias.map(d => d.dias_sequia))

      document.getElementById('resumen').innerHTML = `
        <div class="stat-card">
          <div class="stat-valor">${tempMax}°</div>
          <div class="stat-label">Temp. máx.</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor">${lluviaTotal}</div>
          <div class="stat-label">Lluvia mm</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor">${vientoMax}</div>
          <div class="stat-label">Viento km/h</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor">${sequiaMax}</div>
          <div class="stat-label">Días sequía</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor" style="color:${colorRiesgo[riesgoMax.riesgo]}">${riesgoMax.riesgo}</div>
          <div class="stat-label">Riesgo semana</div>
        </div>
      `

      /* CARDS */
      const contenedor = document.getElementById('cards-container')
      contenedor.innerHTML = ''

      dias.forEach(dia => {
        const fecha = new Date(dia.fecha + 'T00:00:00')
        const fechaTexto = fecha.toLocaleDateString('es-ES', {
          weekday: 'long', day: 'numeric', month: 'short'
        })

        const color = colorRiesgo[dia.riesgo]
        const claseRiesgo = 'riesgo-' + dia.riesgo.toLowerCase()

        const card = document.createElement('div')
        card.className = `card ${claseRiesgo}`

        card.innerHTML = `
          <span class="fecha">${fechaTexto}</span>
          <span class="riesgo-badge"
            style="background:${color}22; color:${color}; border:1px solid ${color}44">
            ${dia.riesgo}
          </span>
          <div class="barra-fondo">
            <div class="barra-relleno"
              style="width:${porcentajeBarra[dia.riesgo]}%; background:${color}">
            </div>
          </div>
          <div class="datos">
            <div class="dato-fila">
              <span class="etiqueta">🌡 Temperatura</span>
              <span class="valor">${dia.temperatura}°C</span>
            </div>
            <div class="dato-fila">
              <span class="etiqueta">💧 Humedad</span>
              <span class="valor">${dia.humedad}%</span>
            </div>
            <div class="dato-fila">
              <span class="etiqueta">🌧 Lluvia</span>
              <span class="valor">${dia.lluvia} mm</span>
            </div>
            <div class="dato-fila">
              <span class="etiqueta">💨 Viento</span>
              <span class="valor">${dia.viento} km/h</span>
            </div>
            <div class="dato-fila">
              <span class="etiqueta">☀️ Días sin lluvia</span>
              <span class="valor">${dia.dias_sequia}</span>
            </div>
          </div>
        `
        contenedor.appendChild(card)
      })
    }
  </script>

</body>
</html>
