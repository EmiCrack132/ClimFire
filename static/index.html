<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClimFire — Victoria, Australia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #331501;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f8fafc;
    }

    header h1 span {
      color: #f97316;
    }

    header p {
      color: #94a3b8;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .modelo-badge {
      display: inline-block;
      margin-top: 0.7rem;
      background: #3b291e;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
    }

    /* ALERTA GENERAL */
    #alerta-general {
      max-width: 700px;
      margin: 0 auto 2rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      display: none;
    }

    /* RESUMEN ESTADÍSTICO */
    #resumen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      max-width: 700px;
      margin: 0 auto 2rem;
    }

    .stat-card {
      background: #3b291e;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      text-align: center;
    }

    .stat-card .stat-valor {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.2rem;
    }

    /* CARDS DE DÍAS */
    #cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.2rem;
      border-top: 4px solid;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      transition: transform 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card .fecha {
      font-size: 0.78rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card .riesgo-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      width: fit-content;
    }

    /* BARRA DE RIESGO */
    .barra-contenedor {
      margin-top: 0.3rem;
    }

    .barra-label {
      font-size: 0.72rem;
      color: #64748b;
      margin-bottom: 0.25rem;
    }

    .barra-fondo {
      background: #0f172a;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }

    .barra-relleno {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    .card .datos {
      margin-top: 0.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.32rem;
      border-top: 1px solid #0f172a;
      padding-top: 0.6rem;
    }

    .card .dato-fila {
      display: flex;
      justify-content: space-between;
      font-size: 0.83rem;
      color: #94a3b8;
    }

    .card .dato-fila span:last-child {
      font-weight: 600;
      color: #e2e8f0;
    }

    /* FOOTER */
    footer {
      text-align: center;
      margin-top: 3rem;
      color: #334155;
      font-size: 0.78rem;
    }

    footer a {
      color: #475569;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      color: #64748b;
      font-size: 1rem;
      margin-top: 4rem;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

  <header>
    <h1>🔥 Clim<span>Fire</span></h1>
    <p>Sistema de predicción de riesgo de incendio forestal — Victoria, Australia</p>
    <span class="modelo-badge">Powered by Random Forest · Open-Meteo API</span>
  </header>

  <div id="alerta-general"></div>

  <div id="resumen">
    <!-- Se llena con JS -->
  </div>

  <div id="cards-container">
    <p class="loading">Consultando modelo de ML...</p>
  </div>

  <footer>
    <p>Datos: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Modelo entrenado con datos históricos 2015–2024</p>
    <p style="margin-top:0.3rem">ClimFire · WeatherWise Hack 2026</p>
  </footer>

  <script>
    // Cuánto porcentaje de la barra llenar según el nivel
    const porcentajeBarra = { "BAJO": 20, "MODERADO": 60, "ALTO": 95 }
    const niveles = { "BAJO": 0, "MODERADO": 1, "ALTO": 2 }

    fetch("/api/forecast")
      .then(r => r.json())
      .then(dias => mostrarDatos(dias))
      .catch(err => {
        document.getElementById("cards-container").innerHTML =
          `<p style="color:#f87171;text-align:center;grid-column:1/-1">
            Error al conectar con el servidor: ${err}
          </p>`
      })

    function mostrarDatos(dias) {

      // ------------------------------------
      // ALERTA GENERAL
      // ------------------------------------
      const riesgoMax = dias.reduce((max, dia) =>
        niveles[dia.riesgo] > niveles[max.riesgo] ? dia : max
      )

      const mensajes = {
        "BAJO":     "Sin riesgo significativo de incendio esta semana.",
        "MODERADO": "Condiciones moderadas detectadas. Mantener precaución.",
        "ALTO":     "⚠️ Riesgo ALTO detectado. Condiciones peligrosas."
      }

      const alerta = document.getElementById("alerta-general")
      alerta.style.display = "block"
      alerta.style.background = riesgoMax.color + "18"
      alerta.style.border = `1px solid ${riesgoMax.color}55`
      alerta.style.color = riesgoMax.color
      alerta.textContent = mensajes[riesgoMax.riesgo]

      // ------------------------------------
      // RESUMEN ESTADÍSTICO
      // ------------------------------------
      const tempMax = Math.max(...dias.map(d => d.temperatura))
      const lluviaTotal = dias.reduce((s, d) => s + d.lluvia, 0)
      const vientoMax = Math.max(...dias.map(d => d.viento))
      const sequiaMax = Math.max(...dias.map(d => d.dias_sequia))

      const resumen = document.getElementById("resumen")
      resumen.innerHTML = `
        <div class="stat-card">
          <div class="stat-valor">${tempMax}°C</div>
          <div class="stat-label">Temp. máxima</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor">${lluviaTotal.toFixed(1)} mm</div>
          <div class="stat-label">Lluvia total</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor">${vientoMax} km/h</div>
          <div class="stat-label">Viento máximo</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor">${sequiaMax} días</div>
          <div class="stat-label">Sequía máx.</div>
        </div>
        <div class="stat-card">
          <div class="stat-valor" style="color:${riesgoMax.color}">${riesgoMax.riesgo}</div>
          <div class="stat-label">Riesgo semana</div>
        </div>
      `

      // ------------------------------------
      // TARJETAS POR DÍA
      // ------------------------------------
      const contenedor = document.getElementById("cards-container")
      contenedor.innerHTML = ""

      dias.forEach(dia => {
        const fecha = new Date(dia.fecha + "T00:00:00")
        const fechaTexto = fecha.toLocaleDateString("es-ES", {
          weekday: "long",
          day: "numeric",
          month: "short"
        })

        const card = document.createElement("div")
        card.className = "card"
        card.style.borderTopColor = dia.color

        card.innerHTML = `
          <span class="fecha">${fechaTexto}</span>
          <span class="riesgo-badge"
            style="background:${dia.color}22; color:${dia.color}">
            ${dia.riesgo}
          </span>

          <div class="barra-contenedor">
            <div class="barra-label">Nivel de riesgo</div>
            <div class="barra-fondo">
              <div class="barra-relleno"
                style="width:${porcentajeBarra[dia.riesgo]}%; background:${dia.color}">
              </div>
            </div>
          </div>

          <div class="datos">
            <div class="dato-fila">
              <span>🌡 Temperatura</span>
              <span>${dia.temperatura}°C</span>
            </div>
            <div class="dato-fila">
              <span>💧 Humedad</span>
              <span>${dia.humedad}%</span>
            </div>
            <div class="dato-fila">
              <span>🌧 Lluvia</span>
              <span>${dia.lluvia} mm</span>
            </div>
            <div class="dato-fila">
              <span>💨 Viento</span>
              <span>${dia.viento} km/h</span>
            </div>
            <div class="dato-fila">
              <span>☀️ Días sin lluvia</span>
              <span>${dia.dias_sequia}</span>
            </div>
          </div>
        `
        contenedor.appendChild(card)
      })
    }
  </script>

</body>
</html>
